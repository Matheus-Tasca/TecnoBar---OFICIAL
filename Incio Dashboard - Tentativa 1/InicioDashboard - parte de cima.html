<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <!--<link rel="stylesheet" href="ParteDeCima.css">-->
    <title>Document</title>

    <style>
    /* container */ 
    #inicio{
        padding: 30px;
    }

    /* divs dados (os 3 quadrados)*/
    .dados{
        border: 1px solid black;
        background-color: aqua;
        font-weight: bold;
        height: 200px;
        width: 200px;
    }

    /* botoes + imagem de logo */
    #botoes{
        padding-left: 90px;
    }
    </style>
</head>
<body>
    <!-- Parte de cima -->
    <div class="container-fluid pt-5 pl-10">
        <div class="row">
            <div class="col-3 border-black" id="botoes">
                <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTDZan_sWxDVQftakMLCoZXb3EkK0BzQvAVVA&usqp=CAU" width="100px" height="100px">
                <br><br>
                <button id="inicio"> Início </button> <!--Trocar o id inicio depois pela classe-->
            </div>
            <div class="col-md-3" id="dado1">
                <div class="dados"> Dado 1 </div>
            </div>
            <div class="col-md-3">
                <div class="dados"> Dado 2 </div>
            </div>
            <div class="col-md-3">
                <div class="dados"> Dado 3 </div>
            </div>
        </div>
    </div>
    <!-- Fim da Parte de cima -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
