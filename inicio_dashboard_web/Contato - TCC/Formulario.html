<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        #fomulario{
            border: 1px solid aqua ;
            background-color: aqua;
            display: inline-block;
            border-radius: 10px;
        }

        #enviar{
            background-color: white;
            border-radius: 5px;
            width: 150px;
            height: 60px;
            cursor: pointer;
        }

        .barra{
            border-radius: 10px;
            width: 600px;
            height: 30px;
        }

        #text-formulario{
            font-weight: bold;
            font-size: 20px;
            text-align: center;
            margin-left: 10px;
            margin-bottom: 200px;
        }

        .topico{
            font-weight: bold;
            font-size: 21px;
        }

        #enviar:hover{
            background-color: aqua;
        }

    </style>
</head>
<body>
    <div id="fomulario">
        <form>
            <p id="text-formulario"> Se preferir, cadastre seus dados e nós te contatamos </p>
            <p class="topico"> Email: </p> 
            <input type="email" name="email" class="barra"><br>
            <p class="topico"> Nome: </p> 
            <input type="text" name="nome" class="barra"><br>
            <p class="topico"> Telefone: </p> 
            <input type="number" name="nome" class="barra"><br><br><br>

            <input type="submit" value="ENVIAR" id="enviar">
        </form>
    </div>
</body>
</html>
