<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" 
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://kit.fontawesome.com/b99e675b6e.js"></script>
    <link rel="stylesheet" href="StyleDashboard.css">
    <script src="scriptDashboard.js"></script>
    <title>Document</title>
</head>
<body id="body">
    <div class="wrapper">
        <div class="sidebar">
            <h2><img src="logo.jpg" id="logo"></h2>
            <ul>
                <li><a href="#"><i class="fas fa-home letra" ></i>Inicio</a></li>
                <li><a href="#"><i class="fas fa-user letra"></i>Dashboard Específico</a></li>
                <li><a href="#"><i class="fas fa-address-card letra"></i>Configurações</a></li>
                <li class="texto_filtro">
                    <span class="texto_filtro">Dados dos últimos:  </span><br>
                    <select name="filtro"  onchange="dados(this.value)"> 
                        <option value="1dia"> 1 dia </option> 
                        <option value="7dias">7 dias</option> 
                        <option value="30dias" selected>30 dias</option> 
                        <option value="3messes">3 messes</option>
                        <option value="6messes">6 messes</option>
                        <option value="1ano">1 ano</option>
                    </select>
                </li>        
            </ul> 
            <i class="fa-solid fa-lamp"></i>
            <div class="social_media">
            <a href="#"><i class="fab fa-facebook-f"></i></a>
            <a href="#"><i class="fab fa-twitter"></i></a>
            <a href="#"><i class="fab fa-instagram"></i></a>
        </div>
        </div>
        <div class="main_content">  
            <div class="info">
                    <div class="card text-bg-secondary mb-3" >
                        <div class="card-header letra">Lucro</div>
                        <div class="card-body">
                        <h5 class="card-title letra">Últimos 30 dias</h5><br>
                        <h1><p class="card-text" style="color: green; text-align: center;" id="lucro"> R$ 5000 </p></h1>
                        </div>
                    </div>
                    <div class="card text-bg-secondary mb-3" >
                        <div class="card-header letra">Venda</div>
                        <div class="card-body">
                        <h5 class="card-title letra">Últimos 30 dias</h5><br>
                        <h1><p class="card-text" style="color: green; text-align: center;" id="venda"> R$ 15000 </p></h1>
                        </div>
                    </div>
                    <div class="card text-bg-success mb-3">
                        <div class="card-header letra">Faturamento</div>
                        <div class="card-body">
                        <h5 class="card-title letra">Últimos 30 dias</h5> <br>
                        <h1><p class="card-text" style="color: green; text-align: center;" id="faturamento"> R$ 8000</p></h1>
                        </div>
                    </div>

                    <div class="container">
                        <div class="mb-3 cards" id="grafico1">
                            <span class="titulo_card letra" > Gráfico 1 </span><br> 
                            <img src="Exemplo_Dados.jpg" class="img_dados">
                        </div>

                        <div class="mb-3 cards" id="grafico2">
                            <span class="titulo_card letra"> Gráfico 2 </span><br> 
                            <img src="Exemplo_Dados.jpg" class="img_dados">
                        </div>
    
                    </div>
                </div>

                
            </div>
        </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" 
    integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
