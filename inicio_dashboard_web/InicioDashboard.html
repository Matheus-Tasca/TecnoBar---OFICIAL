<!--Começo cards-->
<div class="containerCards">
        <div id="filtroDados">
            <span class="texto_filtro">Dados dos últimos:</span><br>
                <select name="filtro"  onchange="dados(this.value)"> 
                    <option value="1dia"> 1 dia </option> 
                    <option value="7dias">7 dias</option> 
                    <option value="30dias" selected>30 dias</option> 
                    <option value="3messes">3 messes</option>
                    <option value="6messes">6 messes</option>
                    <option value="1ano">1 ano</option>
                </select>
        </div>     
        <div class="card text-bg-secondary mb-3" >
            <div class="card-header letra">Lucro</div>
            <div class="card-body">
                <h5 class="card-title letra tituloCard">30 dias</h5><br>
                <h1><p class="card-text cardFormatacao" id="lucro"> R$ 5000 </p></h1>
            </div>
        </div>
        <div class="card text-bg-secondary mb-3" >
            <div class="card-header letra">Venda</div>
            <div class="card-body">
            <h5 class="card-title letra tituloCard">30 dias</h5><br>
            <h1><p class="card-text cardFormatacao" id="venda"> R$ 15000 </p></h1>
            </div>
        </div>
        <div class="card text-bg-success mb-3">
            <div class="card-header letra ">Faturamento</div>
            <div class="card-body">
            <h5 class="card-title letra tituloCard">30 dias</h5> <br>
            <h1><p class="card-text cardFormatacao" id="faturamento"> R$ 8000</p></h1>
            </div>
        </div>
    </div>
<!--Fim cards-->
